

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTHSEC — Coming Soon</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,400&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050506;
    --bg-panel:#0a0b0d;
    --fg:#ECECE9;
    --muted:#7a7d82;
    --muted-dim:#4a4c50;
    --line:#1e1f22;
    --line-bright:#333539;
    --status:#ff3b3b;
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --sans:'Space Grotesk', sans-serif;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    background:var(--bg);
    color:var(--fg);
    font-family:var(--sans);
    height:100%;
    overflow-x:hidden;
  }

  body{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }

  /* ---------- atmosphere ---------- */

  .grid-overlay{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 20%, transparent 75%);
  }

  .scanlines{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.028) 0px,
      rgba(255,255,255,0.028) 1px,
      transparent 1px,
      transparent 3px
    );
    opacity:0.5;
  }

  .vignette{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:radial-gradient(ellipse 90% 70% at 50% 30%, transparent 60%, rgba(0,0,0,0.5) 100%);
  }

  .noise-flash{
    position:fixed;
    inset:0;
    z-index:5;
    pointer-events:none;
    background:#fff;
    opacity:0;
    animation:flash 8s steps(1) infinite;
  }
  @keyframes flash{
    0%,96.4%,97%,100%{ opacity:0; }
    96.6%{ opacity:0.05; }
    96.8%{ opacity:0; }
  }

  /* ---------- top bar ---------- */

  .topbar{
    position:relative;
    z-index:10;
    width:100%;
    max-width:1180px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px clamp(20px,4vw,40px) 0;
  }

  .brandmark{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .brandmark img{
    width:20px;
    height:20px;
    filter: invert(1) brightness(1.4);
    opacity:0.92;
  }

  .brandmark span{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.28em;
    color:var(--muted);
    text-transform:uppercase;
  }

  .status-line{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.14em;
    color:var(--muted);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .status-dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--status);
    box-shadow:0 0 6px 1px rgba(255,59,59,0.7);
    animation:pulse-dot 1.6s ease-in-out infinite;
  }
  @keyframes pulse-dot{
    0%,100%{ opacity:1; }
    50%{ opacity:0.25; }
  }

  /* ---------- hero scan frame ---------- */

  .stage{
    position:relative;
    z-index:10;
    width:100%;
    max-width:560px;
    margin-top:20px;
    padding:0 24px;
  }

  .scan-frame{
    position:relative;
    width:100%;
    aspect-ratio: 720 / 962;
    max-height:52vh;
    margin:0 auto;
    overflow:hidden;
  }

  .scan-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center top;
    filter:grayscale(1) contrast(1.05) brightness(1.55);
    transform: scale(1.6);              
    transform-origin: 50% 60%;
    -webkit-mask-image: linear-gradient(to bottom, black 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 88%, transparent 100%);
    display:block;
  }

  .corner{
    position:absolute;
    width:22px;
    height:22px;
    border:1.5px solid rgba(236,236,233,0.55);
    opacity:0.8;
  }
  .corner.tl{ top:6%; left:2%; border-right:none; border-bottom:none; }
  .corner.tr{ top:6%; right:2%; border-left:none; border-bottom:none; }
  .corner.bl{ top:58%; left:2%; border-right:none; border-top:none; }
  .corner.br{ top:58%; right:2%; border-left:none; border-top:none; }

  .tag{
    position:absolute;
    font-family:var(--mono);
    font-size:9.5px;
    letter-spacing:0.09em;
    color:var(--muted);
    text-transform:uppercase;
    white-space:nowrap;
    opacity:0.85;
  }
  .tag::before{
    content:'';
    display:inline-block;
    width:4px;
    height:4px;
    background:var(--muted);
    margin-right:6px;
    vertical-align:middle;
  }
  .tag.t1{ top:10%; right:-2%; animation:blink-slow 3.4s ease-in-out infinite; }
  .tag.t2{ top:34%; left:-4%; text-align:right; animation:blink-slow 3.4s ease-in-out infinite 0.6s; }
  .tag.t3{ top:56%; right:0%; animation:blink-slow 3.4s ease-in-out infinite 1.2s; }

  @keyframes blink-slow{
    0%,100%{ opacity:0.85; }
    50%{ opacity:0.3; }
  }

  /* ---------- main copy ---------- */

  .content{
    position:relative;
    z-index:10;
    width:100%;
    max-width:640px;
    text-align:center;
    padding:6px 24px 0;
    margin-top:-6px;
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.22em;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:18px;
  }
  .eyebrow .bracket{ color:var(--muted-dim); }

  .wordmark{
    position:relative;
    font-family:var(--mono);
    font-weight:800;
    font-size:clamp(2.6rem, 11vw, 5.2rem);
    letter-spacing:0.05em;
    line-height:1;
    color:var(--fg);
    text-transform:uppercase;
    user-select:none;
  }

  .wordmark .glitch-layer{
    position:absolute;
    top:0; left:0;
    width:100%;
    color:var(--fg);
    clip-path: inset(0 0 100% 0);
  }

  .wordmark .g1{ animation: glitch-a 6.5s infinite steps(1); }
  .wordmark .g2{ animation: glitch-b 6.5s infinite steps(1); }

  @keyframes glitch-a{
    0%,92%{ clip-path: inset(0 0 100% 0); transform:translate(0,0); opacity:0; }
    92.5%{ clip-path: inset(15% 0 55% 0); transform:translate(-6px,0); opacity:1; }
    93%{ clip-path: inset(60% 0 10% 0); transform:translate(5px,0); opacity:1; }
    93.5%{ clip-path: inset(30% 0 40% 0); transform:translate(-3px,0); opacity:1; }
    94%{ clip-path: inset(0 0 100% 0); transform:translate(0,0); opacity:0; }
    97%,97.4%{ clip-path: inset(0 0 100% 0); opacity:0; }
    97.6%{ clip-path: inset(45% 0 20% 0); transform:translate(4px,0); opacity:1; }
    98%{ clip-path: inset(5% 0 75% 0); transform:translate(-4px,0); opacity:1; }
    98.4%{ clip-path: inset(0 0 100% 0); transform:translate(0,0); opacity:0; }
    100%{ clip-path: inset(0 0 100% 0); opacity:0; }
  }
  @keyframes glitch-b{
    0%,91.8%{ clip-path: inset(0 0 100% 0); transform:translate(0,0); opacity:0; }
    92.2%{ clip-path: inset(70% 0 5% 0); transform:translate(6px,0); opacity:1; filter:invert(1); }
    92.9%{ clip-path: inset(20% 0 60% 0); transform:translate(-5px,0); opacity:1; filter:invert(0); }
    93.6%{ clip-path: inset(0 0 100% 0); opacity:0; }
    97.2%,97.5%{ clip-path: inset(0 0 100% 0); opacity:0; }
    97.8%{ clip-path: inset(10% 0 70% 0); transform:translate(-5px,0); opacity:1; filter:invert(1); }
    98.2%{ clip-path: inset(55% 0 15% 0); transform:translate(5px,0); opacity:1; filter:invert(0); }
    98.6%{ clip-path: inset(0 0 100% 0); opacity:0; }
    100%{ clip-path: inset(0 0 100% 0); opacity:0; }
  }

  .tagline{
    font-family:var(--sans);
    font-weight:400;
    font-size:clamp(0.95rem, 2.1vw, 1.1rem);
    color:var(--muted);
    max-width:440px;
    margin:22px auto 0;
    line-height:1.6;
  }

  .divider{
    width:1px;
    height:34px;
    background:linear-gradient(to bottom, transparent, var(--line-bright), transparent);
    margin:32px auto;
  }

  .release{
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-family:var(--mono);
    font-size:12.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--fg);
    border:1px solid var(--line-bright);
    padding:10px 18px;
  }

  .release .cursor{
    display:inline-block;
    width:7px;
    height:13px;
    background:var(--fg);
    animation:cursor-blink 1s steps(1) infinite;
  }
  @keyframes cursor-blink{
    0%,50%{ opacity:1; }
    50.01%,100%{ opacity:0; }
  }

  /* ---------- footer ---------- */

  .footer{
    position:relative;
    z-index:10;
    margin-top:auto;
    padding:40px 24px 26px;
    text-align:center;
  }

  .footer a{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.08em;
    color:var(--muted-dim);
    text-decoration:none;
    transition:color 0.25s ease;
  }
  .footer a:hover{ color:var(--muted); }

  .footer .label{
    color:var(--muted-dim);
    opacity:0.7;
  }

  /* ---------- focus visibility ---------- */
  a:focus-visible{ outline:1px solid var(--fg); outline-offset:3px; }

  /* ---------- responsive ---------- */
  @media (max-width:480px){
    .scan-frame{ max-height:40vh; }
    .corner{ width:16px; height:16px; }
    .tag{ font-size:8.5px; }
  }
</style>
</head>
